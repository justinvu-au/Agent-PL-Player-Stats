name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: plstatsacr.azurecr.io
  AGENT_IMAGE: plstatsacr.azurecr.io/pl-stats-agent
  FRONTEND_IMAGE: plstatsacr.azurecr.io/pl-stats-frontend

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd agent
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          cd agent
          PYTHONPATH=src pytest tests/ -v

  # ── Job 2: Build and scan agent ─────────────────────────────
  build-agent:
    name: Build and scan agent
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name plstatsacr

      - name: Build agent image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ env.AGENT_IMAGE }}:${{ github.sha }} \
            -t ${{ env.AGENT_IMAGE }}:latest \
            ./agent

      - name: Scan agent image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.AGENT_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push agent image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.AGENT_IMAGE }}:${{ github.sha }}
          docker push ${{ env.AGENT_IMAGE }}:latest

  # ── Job 3: Build and scan frontend ──────────────────────────
  build-frontend:
    name: Build and scan frontend
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name plstatsacr

      - name: Build frontend image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            ./frontend

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push frontend image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  # ── Job 4: Deploy to AKS ────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: [build-agent, build-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Update agent image tag
        run: |
          kubectl set image deployment/pl-stats-agent \
            agent=${{ env.AGENT_IMAGE }}:${{ github.sha }}

      - name: Update frontend image tag
        run: |
          kubectl set image deployment/pl-stats-frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/pl-stats-agent --timeout=120s
          kubectl rollout status deployment/pl-stats-frontend --timeout=120s

      - name: Show running pods
        run: kubectl get pods